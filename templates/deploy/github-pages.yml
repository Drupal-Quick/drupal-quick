# Generated by drupalquick (dq:static).
# Publishes the Tome static export (html/) to GitHub Pages.
#
# This assumes the html/ directory is present in the repo (committed, or produced
# by an earlier build step). GitHub Pages serves the pre-built HTML; it does not
# run Drupal. Enable Pages for the repo with "GitHub Actions" as the source.
name: Deploy static site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: html
      - id: deployment
        uses: actions/deploy-pages@v4
