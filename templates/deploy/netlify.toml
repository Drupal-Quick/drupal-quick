# Netlify deploy config for the static (Tome) export.
#
# The static HTML lives in html/ (Tome's default output directory). Commit that
# directory, or generate it in a CI step before publishing. Netlify itself does
# not run Drupal — it just serves the pre-built HTML.
[build]
  publish = "html"
  command = ""

# --- URL form -----------------------------------------------------------------
# Serve extensionless paths as their directory index directly (200) instead of
# Netlify's default 301 to the trailing-slash URL. The export's internal links
# are slashless (Drupal path form, matching the canonical tags), and the 301
# hop breaks cross-document view transitions — a redirect discards the old
# page's snapshot, turning the crossfade into a white flash. force is off, so
# real files (assets) always win over the rewrite.
[[redirects]]
  from = "/*"
  to = "/:splat/index.html"
  status = 200
  force = false

# --- Caching ----------------------------------------------------------------
# Netlify applies the most specific matching rule, so the broad HTML default
# below is overridden by the asset rules. Netlify also serves Brotli/gzip
# automatically.

# Content-hashed aggregates (filename changes when content changes) — cache
# forever.
[[headers]]
  for = "/sites/default/files/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sites/default/files/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Theme/core/library assets have stable names, so cache a day and revalidate
# rather than pinning forever (a re-export may change them).
[[headers]]
  for = "/themes/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/core/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/libraries/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# HTML: always revalidate so content changes appear immediately after a deploy.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
